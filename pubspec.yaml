name: segemin_local
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+4

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  # Iconos de Cupertino
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.4
  http: ^1.6.0
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  # IMPORTANTE: Se movió aquí para evitar el error de compilación en Release
  flutter_native_splash: ^2.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

# --- Configuración del Icono de la App ---
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logo_app_8.png"
  image_path_ios: "assets/images/logo_app_8.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo_app_8.png"
  min_sdk_android: 21

# --- Configuración de la Pantalla de Carga (Splash) ---
flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/logo_app_8.png"
  android_12:
    image: "assets/images/logo_app_8.png"
    icon_background_color: "#FFFFFF"

flutter:
  uses-material-design: true
  assets:
    - assets/images/